version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: tiktok-shop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tiktok_shop
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tiktok-shop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tiktok-shop-server
    restart: unless-stopped
    ports:
      - "3002:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/tiktok_shop
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./.chrome-data:/app/.chrome-data

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: tiktok-shop-client
    restart: unless-stopped
    ports:
      - "8181:80"
    depends_on:
      - server

volumes:
  pgdata:
